version: 0.2

env:
  variables:
    NEXT_PUBLIC_API_URL: "http://book-app-backend-prod.eba-3tfjm3s6.ap-northeast-2.elasticbeanstalk.com"

phases:
  install:
    runtime-versions:
      nodejs: 22
  pre_build:
    commands:
      - echo "Checking versions..."
      - node -v && npm -v
  build:
    commands:
      - echo "Build started..."
      # 빌드 시점에만 폴더로 진입해서 빌드를 수행합니다.
      - cd fullstack-book-app-front && npm ci && npm run build
  post_build:
    commands:
      - echo "Post-build started..."
      # 💡 중요: 이미 fullstack-book-app-front 폴더 내부이므로 cd 명령어를 지웠습니다.
      
      # [필수] 현재 폴더 기준(.next/standalone)으로 public과 static 폴더를 복사합니다.
      - mkdir -p .next/standalone/public
      - '[ -d public ] && cp -r public/. .next/standalone/public/ || true'
      - mkdir -p .next/standalone/.next/static
      - cp -r .next/static/. .next/standalone/.next/static/
      
      # [선택] EB 확장 설정이 있다면 standalone 폴더로 복사합니다.
      - '[ -d .ebextensions ] && cp -r .ebextensions .next/standalone/ || true'
      
      - echo "Checking standalone directory..."
      - ls -la .next/standalone

artifacts:
  files:
    - '**/*'
  # CodeBuild가 최종 결과물을 수집할 루트 위치를 지정합니다.
  base-directory: fullstack-book-app-front/.next/standalone
  discard-paths: no
