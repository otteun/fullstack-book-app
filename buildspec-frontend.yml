version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22

  pre_build:
    commands:
      - echo "Installing dependencies..."
      - npm ci

  build:
    commands:
      - echo "Building project..."
      - npm run build

  post_build:
    commands:
      - echo "Preparing deployment package..."
      - mkdir -p deploy-frontend

      - cp -r .next deploy-frontend/
      - cp -r node_modules deploy-frontend/
      - cp package.json deploy-frontend/
      - cp package-lock.json deploy-frontend/
      - cp Procfile deploy-frontend/
      - cp -r public deploy-frontend/ || true

      - ls -la deploy-frontend/

artifacts:
  files:
    - '**/*'
  base-directory: deploy-frontend
