version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22

  pre_build:
    commands:
      - echo "Installing dependencies..."
      - cd fullstack-book-app-front
      - npm install

  build:
    commands:
      - echo "Building project..."
      - cd fullstack-book-app-front
      - npm run build

  post_build:
    commands:
      - echo "Preparing deployment package..."
      - cd $CODEBUILD_SRC_DIR
      - mkdir -p deploy-frontend

      - cp -r fullstack-book-app-front/.next deploy-frontend/
      - cp -r fullstack-book-app-front/node_modules deploy-frontend/
      - cp fullstack-book-app-front/package.json deploy-frontend/
      - cp fullstack-book-app-front/package-lock.json deploy-frontend/
      - cp fullstack-book-app-front/Procfile deploy-frontend/
      - cp -r fullstack-book-app-front/public deploy-frontend/ || true

      - ls -la deploy-frontend/

artifacts:
  files:
    - '**/*'
  base-directory: deploy-frontend
