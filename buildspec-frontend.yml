version: 0.2

env:
  variables:
    NEXT_PUBLIC_API_URL: "http://book-app-backend-prod.eba-3tfjm3s6.ap-northeast-2.elasticbeanstalk.com"
    NODE_ENV: "production"

phases:
  install:
    runtime-versions:
      nodejs: 22
  
  pre_build:
    commands:
      - echo "Checking versions..."
      - node -v && npm -v
      
  build:
    commands:
      - echo "Build started..."
      # 빌드 수행을 위해 프론트엔드 폴더로 명확히 진입
      - cd fullstack-book-app-front && npm ci && npm run build
      
  post_build:
    commands:
      - echo "Post-build started..."
      # 🚨 [수정] 페이즈가 바뀌었으므로 프론트엔드 폴더로 다시 한 번 진입해야 합니다!
      - cd fullstack-book-app-front
      
      # [필수] standalone 구동을 위한 public 및 static 폴더 복사
      - mkdir -p .next/standalone/public
      - '[ -d public ] && cp -r public/. .next/standalone/public/ || true'
      - mkdir -p .next/standalone/.next/static
      - cp -r .next/static/. .next/standalone/.next/static/
      
      # [선택] 만약 루트에 작성해 둔 Procfile이 있다면 standalone 내부로 복사해 줍니다.
      # (Nginx가 8080을 바라보고 있다면 꼭 필요한 조치입니다)
      - '[ -f Procfile ] && cp Procfile .next/standalone/ || true'
      - '[ -d .ebextensions ] && cp -r .ebextensions .next/standalone/ || true'
      
      - echo "Checking standalone directory..."
      - ls -la .next/standalone

artifacts:
  files:
    - '**/*'
  # CodeBuild가 최종 결과물을 수집할 루트 위치
  base-directory: fullstack-book-app-front/.next/standalone
  discard-paths: no
