spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/book_app?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: update        # 운영: validate (스키마 자동 변경 금지)
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
    open-in-view: false         # OSIV 비활성화 (성능)

server:
  port: ${SERVER_PORT:8080}

# CORS 허용 출처 (Next.js FE ALB DNS)
app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}

# Actuator (ALB 헬스 체크용)
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.example.noteapp: DEBUG
