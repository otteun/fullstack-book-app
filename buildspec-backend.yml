version: 0.2

phases:
  install:
    commands:
      - echo "Installing Java 21"
      - yum install -y java-21-amazon-corretto-devel

      # 🔥 정확한 JAVA_HOME 자동 탐색 (핵심)
      - export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
      - export PATH=$JAVA_HOME/bin:$PATH

      - echo "JAVA_HOME=$JAVA_HOME"
      - java -version

  pre_build:
    commands:
      - chmod +x gradlew

  build:
    commands:
      - echo "Build started"
      - ./gradlew clean build

  post_build:
    commands:
      - echo "Packaging"
      - mkdir -p deploy
      - cp build/libs/*.jar deploy/app.jar

artifacts:
  files:
    - deploy/app.jar
