version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto21
    commands:
      - echo "Using Java 21"
      - java -version

  pre_build:
    commands:
      - echo "Backend build started"
      - chmod +x gradlew

  build:
    commands:
      - ./gradlew clean bootJar -x test

  post_build:
    commands:
      - echo "Prepare deploy package"
      - mkdir -p deploy
      - ls build/libs
      - JAR_FILE=$(ls build/libs/*.jar | grep -v plain | head -n 1)
      - echo "Using $JAR_FILE"
      - cp "$JAR_FILE" deploy/fullstack-book-app.jar

artifacts:
  files:
    - deploy/fullstack-book-app.jar
