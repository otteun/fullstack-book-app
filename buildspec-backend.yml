version: 0.2

phases:
  install:
    runtime-versions:
      java: 21

  pre_build:
    commands:
      - echo "Backend build started"
      - export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
      - export PATH=$JAVA_HOME/bin:$PATH
      - java -version

  build:
    commands:
      - chmod +x gradlew
      - ./gradlew bootJar -x test

  post_build:
    commands:
      - echo "Preparing deployment package"
      - mkdir -p deploy-backend
      - cp build/libs/*.jar deploy-backend/book-app.jar
      - cp Procfile deploy-backend/
      - ls -la deploy-backend/

artifacts:
  base-directory: deploy-backend
  files:
    - '**/*'
