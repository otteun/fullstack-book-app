version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto21
  pre_build:
    commands:
      - java -version
  build:
    commands:
      - chmod +x ./gradlew
      - ./gradlew bootJar -x test
  post_build:
    commands:
      - mkdir -p deploy-backend
      - cp build/libs/*.jar deploy-backend/book-app.jar
      - cp Procfile deploy-backend/
      - '[ -d .ebextensions ] && cp -r .ebextensions deploy-backend/ || true'
      - ls -la deploy-backend/

artifacts:
  files:
    - build/libs/fullstack-book-app.jar  # 빌드된 jar 파일
    - Procfile                           # Procfile 포함
    - .ebextensions/**/* # 설정 파일 포함