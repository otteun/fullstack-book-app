version: 0.2

phases:
  install:
    runtime-versions:
      java: 21

  pre_build:
    commands:
      - echo "Backend build started"
      - chmod +x gradlew
      - java -version

  build:
    commands:
      - echo "Build backend"
      - ./gradlew clean build

  post_build:
    commands:
      - echo "Prepare deploy package"
      - mkdir -p deploy
      - cp build/libs/*.jar deploy/application.jar

artifacts:
  base-directory: deploy
  files:
    - '**/*'
