version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
  pre_build:
    commands:
      - java -version
  build:
    commands:
      - chmod +x ./gradlew
      - ./gradlew bootJar -x test
  post_build:
    commands:
      - mkdir -p deploy-backend
      - cp build/libs/*.jar deploy-backend/book-app.jar
      - cp Procfile deploy-backend/
      - '[ -d .ebextensions ] && cp -r .ebextensions deploy-backend/ || true'
      - ls -la deploy-backend/

artifacts:
  files:
    - '**/*'
  base-directory: deploy-backend
  discard-paths: no