version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto21

  build:
    commands:
      - cd fullstack-book-app && chmod +x gradlew && ./gradlew bootJar -x test
  post_build:
    commands:
      - echo "Post-build started..."
      - mkdir -p deploy-backend
      - cp fullstack-book-app/build/libs/*.jar deploy-backend/book-app.jar
      - cp fullstack-book-app/Procfile deploy-backend/
      - '[ -d fullstack-book-app/.ebextensions ] && cp -r fullstack-book-app/.ebextensions deploy-backend/ || true'
      - ls -la deploy-backend/

artifacts:
  files:
    - '**/*'
  base-directory: deploy-backend
  discard-paths: no